<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Support History Timeline</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --primary: #009eb3;
            /* URA-PORTAL cyan */
            --accent: #ff007f;
            /* Magenta */
            --bg: #fafbfc;
            /* Light background */
            --card-bg: rgba(255, 255, 255, 0.85);
            --text: #1a1e23;
            --text-muted: #6e7781;
            --border: rgba(0, 0, 0, 0.08);
            /* Earth Colors for Event Categories */
            --cat-policy: #5b7c99; /* くすんだ青 */
            --cat-organization: #738c66; /* 落ち着いた緑 */
            --cat-infrastructure: #a86c5d; /* レンガ色 */
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 158, 179, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.03) 0%, transparent 20%);
        }

        .header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
        }

        .header h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: var(--text);
        }

        .header p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .timeline-container {
            position: relative;
            padding: 100px 0;
        }

        /* 中央の線 */
        .timeline-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--accent), transparent);
            transform: translateX(-50%);
            z-index: 1;
        }

        /* 年代表示 */
        .year-indicator {
            position: sticky;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            font-family: 'Times New Roman', "Yu Mincho", "MS Mincho", serif;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.08);
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        .event-item {
            width: 100%;
            margin-bottom: 300px;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(50px);
        }

        .event-card {
            width: 45%;
            padding: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            transform-style: preserve-3d;
        }

        .event-card:hover {
            border-color: var(--primary);
            box-shadow: 0 20px 50px rgba(0, 158, 179, 0.15);
            transform: translateY(-10px) rotateX(2deg) rotateY(1deg);
        }

        .event-item:nth-child(even) {
            justify-content: flex-end;
            padding-right: 10%;
        }

        .event-item:nth-child(odd) {
            justify-content: flex-start;
            padding-left: 10%;
        }

        .date-label {
            font-size: 1.5rem;
            font-family: 'Times New Roman', "Yu Mincho", "MS Mincho", serif;
            color: var(--text);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--text);
            font-weight: 600;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-top: 15px;
            /* Default fallback */
            background: rgba(0, 158, 179, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 158, 179, 0.2);
        }

        .tag[data-cat="Policy"] { background: rgba(91, 124, 153, 0.1); color: var(--cat-policy); border-color: rgba(91, 124, 153, 0.2); }
        .tag[data-cat="Organization"] { background: rgba(115, 140, 102, 0.1); color: var(--cat-organization); border-color: rgba(115, 140, 102, 0.2); }
        .tag[data-cat="Infrastructure"] { background: rgba(168, 108, 93, 0.1); color: var(--cat-infrastructure); border-color: rgba(168, 108, 93, 0.2); }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
            opacity: 0.5;
        }

        .delete-btn:hover {
            color: var(--accent);
            opacity: 1;
        }

        footer {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            background: linear-gradient(to bottom, var(--bg), #e2e8f0);
            color: var(--text-muted);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--text);
            background: var(--card-bg);
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            z-index: 999;
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: #fff;
        }

        /* Filter Controls */
        .filter-container {
            position: sticky;
            top: 20px;
            z-index: 90;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            width: fit-content;
            margin: -50px auto 50px auto;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .filter-select,
        .search-input {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .filter-select:focus,
        .search-input:focus {
            border-color: var(--primary);
        }

        .filter-select option {
            background: #fff;
            color: var(--text);
        }

        .search-input {
            width: 200px;
        }

        /* Add Event Modal & Button */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 158, 179, 0.3);
            z-index: 100;
            transition: transform 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.15);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .modal-title {
            color: var(--text);
            font-size: 1.5rem;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            background: #fafbfc;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 5px;
            color: var(--text);
            font-family: inherit;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #00899c;
        }

        /* Animations for Skeleton Loading & Scroll Icon */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .skeleton-card {
            width: 45%;
            height: 200px;
            background: rgba(200, 200, 200, 0.3);
            border-radius: 20px;
            margin: 0 auto 50px auto;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .skeleton-card::after {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: skeletonShine 1.5s infinite;
        }
        @keyframes skeletonShine {
            100% { left: 150%; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
        .scroll-down-icon {
            margin-top: 15px;
            width: 30px;
            height: 30px;
            fill: var(--text-muted);
            animation: bounce 2s infinite ease-in-out;
        }

        /* Lang Toggle Button */
        .lang-toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        #lang-toggle-btn {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        #lang-toggle-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
        
        /* Storage Note */
        .storage-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Language Toggle -->
    <div class="lang-toggle-container">
        <button id="lang-toggle-btn">EN</button>
    </div>

    <section class="header">
        <h1>Historical Nav</h1>
        <p class="i18n" data-ja="日本における研究支援の変遷を辿る" data-en="Tracing the evolution of research support in Japan">日本における研究支援の変遷を辿る</p>
        <div style="margin-top: 50px; font-size: 0.8rem; opacity: 0.5; display: flex; flex-direction: column; align-items: center;">
            <span class="i18n" data-ja="下へスクロールして時間を遡る" data-en="SCROLL DOWN TO GO BACK IN TIME">下へスクロールして時間を遡る</span>
            <svg class="scroll-down-icon" viewBox="0 0 24 24">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
            </svg>
        </div>
    </section>

    <!-- Filter Controls -->
    <div class="filter-container">
        <select id="category-filter" class="filter-select">
            <option value="All" class="i18n-opt" data-ja="全て" data-en="All Categories">全て</option>
            <option value="Policy" class="i18n-opt" data-ja="政策・制度" data-en="Policy">政策・制度</option>
            <option value="Organization" class="i18n-opt" data-ja="組織・ネットワーク" data-en="Organization">組織・ネットワーク</option>
            <option value="Infrastructure" class="i18n-opt" data-ja="システム・基盤" data-en="Infrastructure">システム・基盤</option>
        </select>
        <input type="text" id="keyword-search" class="search-input i18n-placeholder" data-ja="キーワード検索..." data-en="Search keywords..." placeholder="キーワード検索...">
    </div>

    <div class="timeline-container">
        <div class="timeline-line"></div>
        <div class="year-indicator" id="sticky-year">2025</div>

        <div id="events-wrapper">
            <div id="loading-message" style="display: flex; flex-direction: column; width: 100%;">
                <div class="skeleton-card" style="align-self: flex-start; margin-left: 10%;"></div>
                <div class="skeleton-card" style="align-self: flex-end; margin-right: 10%;"></div>
                <div class="skeleton-card" style="align-self: flex-start; margin-left: 10%;"></div>
            </div>
            <!-- Events will be injected here by JavaScript -->
        </div>
    </div>

    <footer>
        <p class="i18n" data-ja="そして、時は続く..." data-en="AND THE JOURNEY CONTINUES...">そして、時は続く...</p>
    </footer>

    <!-- Buttons -->
    <div class="add-btn" id="add-event-btn" title="Add New Event">+</div>

    <!-- Add Event Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title i18n" data-ja="出来事の追加" data-en="Add Historical Event">出来事の追加</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="add-event-form">
                <div class="form-group">
                    <label for="event-year" class="i18n" data-ja="年度" data-en="Year">年度</label>
                    <input type="number" id="event-year" class="form-control" required min="1900" max="2100">
                </div>
                <div class="form-group">
                    <label for="event-category" class="i18n" data-ja="カテゴリー" data-en="Category">カテゴリー</label>
                    <select id="event-category" class="form-control" required>
                        <option value="Policy" class="i18n-opt" data-ja="政策・制度" data-en="Policy">政策・制度</option>
                        <option value="Organization" class="i18n-opt" data-ja="組織・ネットワーク" data-en="Organization">組織・ネットワーク</option>
                        <option value="Infrastructure" class="i18n-opt" data-ja="システム・基盤" data-en="Infrastructure">システム・基盤</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="event-tag" class="i18n" data-ja="タグ" data-en="Tag">タグ</label>
                    <input type="text" id="event-tag" class="form-control i18n-placeholder" list="existing-tags" required
                        data-ja="例：研究力強化" data-en="e.g. Research Support" placeholder="例：研究力強化">
                    <datalist id="existing-tags"></datalist>
                </div>
                <div class="form-group">
                    <label for="event-title" class="i18n" data-ja="出来事の名前" data-en="Title">出来事の名前</label>
                    <input type="text" id="event-title" class="form-control i18n-placeholder" required data-ja="例：新しい制度の開始" data-en="e.g. Launch of a new system" placeholder="例：新しい制度の開始">
                </div>
                <div class="form-group">
                    <label for="event-description" class="i18n" data-ja="説明" data-en="Description">説明</label>
                    <textarea id="event-description" class="form-control i18n-placeholder" required
                        data-ja="出来事の詳細を記述してください..." data-en="Describe the historical event in detail..." placeholder="出来事の詳細を記述してください..."></textarea>
                </div>
                <button type="submit" class="submit-btn i18n" data-ja="タイムラインに追加する" data-en="Add Event to Timeline">タイムラインに追加する</button>
                <p class="storage-note i18n" data-ja="※追加したデータは、現在お使いのブラウザ（ローカルストレージ）にのみ保存され、公開されることはありません。" data-en="* Note: Added events are saved only in your local browser storage and are not published.">※追加したデータは、現在お使いのブラウザ（ローカルストレージ）にのみ保存され、公開されることはありません。</p>
            </form>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const eventsWrapper = document.getElementById('events-wrapper');
        const yearDisplay = document.getElementById('sticky-year');
        const categoryFilter = document.getElementById('category-filter');
        const keywordSearch = document.getElementById('keyword-search');

        let allEventsData = []; // Store all fetched data globally

        // Function to create DOM elements for an event
        function createEventElement(eventData) {
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';
            eventItem.setAttribute('data-id', eventData.id || `default-${eventData.year}-${eventData.title}`);
            eventItem.setAttribute('data-year', eventData.year);
            eventItem.setAttribute('data-category', eventData.category);

            // uniqueId for deletion
            const uniqueId = eventData.id ? eventData.id : `def-${eventData.year}-${eventData.title.substring(0, 5)}`;
            const deleteButtonHtml = `<button class="delete-btn" onclick="deleteEvent('${uniqueId}')" title="Delete Event">×</button>`;

            eventItem.innerHTML = `
                <div class="event-card">
                    ${deleteButtonHtml}
                    <span class="date-label">${eventData.year}</span>
                    <h3 class="title">${eventData.title}</h3>
                    <p class="description">${eventData.description}</p>
                    <span class="tag" data-cat="${eventData.category}">${eventData.tag}</span>
                </div>
            `;
            return eventItem;
        }

        // Function to delete an event (both custom and default)
        window.deleteEvent = function (eventId) {
            const confirmMsg = window.currentLang === 'en' 
                ? "Are you sure you want to delete this event?" 
                : "この出来事を削除しますか？";
            if (!confirm(confirmMsg)) return;

            // Handle custom events
            let localEvents = JSON.parse(localStorage.getItem('customHistoryEvents')) || [];
            if (localEvents.some(e => e.id.toString() === eventId.toString())) {
                localEvents = localEvents.filter(e => e.id.toString() !== eventId.toString());
                localStorage.setItem('customHistoryEvents', JSON.stringify(localEvents));
            } else {
                // Record deleted default event IDs
                let deletedIds = JSON.parse(localStorage.getItem('deletedHistoryEventIds')) || [];
                deletedIds.push(eventId);
                localStorage.setItem('deletedHistoryEventIds', JSON.stringify(deletedIds));
            }

            // Remove from global dataset
            allEventsData = allEventsData.filter(e => {
                const uniqueId = e.id ? e.id.toString() : `def-${e.year}-${e.title.substring(0, 5)}`;
                return uniqueId !== eventId.toString();
            });

            // Re-render components
            renderTimeline();
            updateTagDatalist();
        };

        // Populate datalist with unique tags
        function updateTagDatalist() {
            const datalist = document.getElementById('existing-tags');
            if (!datalist) return;

            const uniqueTags = [...new Set(allEventsData.map(e => e.tag))].filter(Boolean);
            datalist.innerHTML = '';

            uniqueTags.forEach(tag => {
                const option = document.createElement('option');
                option.value = tag;
                datalist.appendChild(option);
            });
        }

        // Function to initialize GSAP animations
        function initGSAP() {
            // Kill all existing ScrollTriggers to prevent overlaps when filtering
            ScrollTrigger.getAll().forEach(trigger => trigger.kill());

            const events = document.querySelectorAll('.event-item');

            // Set initial state for year indicator
            if (events.length > 0) {
                yearDisplay.innerText = events[0].getAttribute('data-year');
            } else {
                yearDisplay.innerText = "----";
            }

            events.forEach((event) => {
                const year = event.getAttribute('data-year');

                gsap.fromTo(event,
                    { opacity: 0, y: 50 },
                    {
                        opacity: 1,
                        y: 0,
                        scrollTrigger: {
                            trigger: event,
                            start: "top 80%",
                            end: "top 20%",
                            scrub: true,
                            onEnter: () => yearDisplay.innerText = year,
                            onEnterBack: () => yearDisplay.innerText = year,
                        }
                    }
                );
            });

            ScrollTrigger.refresh();
        }

        // Render timeline based on current filters
        function renderTimeline() {
            const selectedCategory = categoryFilter.value;
            const keyword = keywordSearch.value.toLowerCase();

            // Filter data
            const filteredData = allEventsData.filter(event => {
                const matchesCategory = selectedCategory === 'All' || event.category === selectedCategory;
                const matchesKeyword = event.title.toLowerCase().includes(keyword) ||
                    event.description.toLowerCase().includes(keyword) ||
                    event.tag.toLowerCase().includes(keyword);
                return matchesCategory && matchesKeyword;
            });

            // Clear wrapper
            eventsWrapper.innerHTML = '';

            if (filteredData.length === 0) {
                const noMatchText = window.currentLang === 'en' 
                    ? 'No matching events found.' 
                    : '検索条件に一致する出来事が見つかりませんでした。';
                eventsWrapper.innerHTML = `
                    <div style="text-align: center; color: var(--text); padding: 50px; font-size: 1.2rem;">
                        ${noMatchText}
                    </div>
                `;
            } else {
                // Generate and append DOM elements
                filteredData.forEach(event => {
                    const el = createEventElement(event);
                    eventsWrapper.appendChild(el);
                });
            }

            // Re-initialize animations
            setTimeout(initGSAP, 100);
        }

        // Modal Logic
        const addEventBtn = document.getElementById('add-event-btn');
        const eventModal = document.getElementById('event-modal');
        const closeModalBtn = document.getElementById('close-modal');
        const addEventForm = document.getElementById('add-event-form');

        addEventBtn.addEventListener('click', () => {
            eventModal.classList.add('active');
        });

        closeModalBtn.addEventListener('click', () => {
            eventModal.classList.remove('active');
        });

        eventModal.addEventListener('click', (e) => {
            if (e.target === eventModal) {
                eventModal.classList.remove('active');
            }
        });

        // Handle Form Submission
        addEventForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Create new event object
            const newEvent = {
                id: Date.now(), // Unique ID so it can be deleted
                year: parseInt(document.getElementById('event-year').value),
                category: document.getElementById('event-category').value,
                tag: document.getElementById('event-tag').value,
                title: document.getElementById('event-title').value,
                description: document.getElementById('event-description').value
            };

            // Save to localStorage
            const localEvents = JSON.parse(localStorage.getItem('customHistoryEvents')) || [];
            localEvents.push(newEvent);
            localStorage.setItem('customHistoryEvents', JSON.stringify(localEvents));

            // Add to active dataset and re-sort (descending year)
            allEventsData.push(newEvent);
            allEventsData.sort((a, b) => b.year - a.year);

            // Reset form and close modal
            addEventForm.reset();
            eventModal.classList.remove('active');

            // Re-render timeline with new data and updated tags
            renderTimeline();
            updateTagDatalist();
        });

        // Fetch data initially
        async function loadHistoryData() {
            try {
                // Fetch JSON data
                const response = await fetch('data/history.json');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const fetchedData = await response.json();

                // Retrieve local data
                const localData = JSON.parse(localStorage.getItem('customHistoryEvents')) || [];

                // Filter out deleted default events
                const deletedIds = JSON.parse(localStorage.getItem('deletedHistoryEventIds')) || [];
                const filteredFetchedData = fetchedData.filter(e => {
                    const uniqueId = `def-${e.year}-${e.title.substring(0, 5)}`;
                    return !deletedIds.includes(uniqueId);
                });

                // Combine and sort descending by year
                allEventsData = [...filteredFetchedData, ...localData];
                allEventsData.sort((a, b) => b.year - a.year);

                // Remove loading message
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();

                // Initial render and populate tags
                renderTimeline();
                updateTagDatalist();

            } catch (error) {
                console.error("Error loading history data:", error);
                eventsWrapper.innerHTML = `
                    <div style="text-align: center; color: red; padding: 50px;">
                        Error loading data. Please try again later.
                    </div>
                `;
            }
        }

        // Language Toggle Logic
        window.currentLang = 'ja';
        function updateLanguage() {
            document.querySelectorAll('.i18n').forEach(el => { el.innerText = el.getAttribute(`data-${window.currentLang}`); });
            document.querySelectorAll('.i18n-opt').forEach(el => { el.innerText = el.getAttribute(`data-${window.currentLang}`); });
            document.querySelectorAll('.i18n-placeholder').forEach(el => { el.placeholder = el.getAttribute(`data-${window.currentLang}`); });
            
            const btn = document.getElementById('lang-toggle-btn');
            if (btn) btn.innerText = window.currentLang === 'ja' ? 'EN' : 'JP';
        }

        document.getElementById('lang-toggle-btn').addEventListener('click', () => {
            window.currentLang = window.currentLang === 'ja' ? 'en' : 'ja';
            updateLanguage();
            renderTimeline();
        });

        // Event Listeners for Filters
        categoryFilter.addEventListener('change', renderTimeline);
        keywordSearch.addEventListener('input', () => {
            renderTimeline();
        });

        // Start the process
        document.addEventListener('DOMContentLoaded', () => {
            updateLanguage();
            setTimeout(loadHistoryData, 600); // Short delay to visually show the new skeleton loader
        });

    </script>
</body>

</html>
