<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Support History Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@600;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                        serif: ['Noto Serif JP', 'serif'],
                    },
                    colors: {
                        primary: '#009eb3',
                        accent: '#ff007f',
                    }
                }
            }
        }
    </script>
    <style>
        .timeline-line-gradient {
            background: linear-gradient(to bottom, #cbd5e1 0%, #009eb3 20%, #ff007f 80%, transparent 100%);
        }
        
        /* Smooth scrolling for filter nav */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism card enhancement */
        .event-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Typography adjustments */
        .prose-custom {
            line-height: 1.75;
            letter-spacing: 0.01em;
        }

        /* High Importance Animation */
        @keyframes pulse-border {
            0% { border-color: rgba(0, 158, 179, 0.3); }
            50% { border-color: rgba(0, 158, 179, 0.8); }
            100% { border-color: rgba(0, 158, 179, 0.3); }
        }
        .high-importance-glow {
            animation: pulse-border 3s infinite;
        }
    </style>
</head>

<body class="overflow-x-hidden bg-stone-50 text-slate-800 font-sans selection:bg-primary selection:text-white">

    <!-- Hero Header -->
    <header
        class="relative h-[60vh] flex flex-col justify-center items-center text-center px-4 bg-gradient-to-br from-slate-100 to-stone-200">
        <h1 class="text-5xl md:text-7xl font-serif font-black tracking-tighter mb-4 opacity-0" id="hero-title">
            Historical Nav
        </h1>
        <p class="text-lg md:text-xl text-slate-600 font-light tracking-widest opacity-0" id="hero-subtitle">
            日本における研究支援の変遷を辿る
        </p>
        <div class="absolute bottom-10 animate-bounce cursor-pointer flex flex-col items-center gap-2 opacity-0"
            id="scroll-indicator">
            <span class="text-[10px] uppercase tracking-[0.3em] text-slate-400">Scroll Down</span>
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7-7-7"></path>
            </svg>
        </div>
    </header>

    <!-- Sticky Navigation (Glassmorphism) -->
    <nav
        class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-xl border-b border-slate-200/60 shadow-sm transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center gap-6">
            <div class="w-full flex items-center gap-2 overflow-x-auto hide-scrollbar py-2 -my-2 md:flex-1">
                <button data-cat="All"
                    class="filter-btn active flex-shrink-0 px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300 bg-slate-900 text-white shadow-lg shadow-slate-200 scale-105">全て</button>
                <button data-cat="基本計画"
                    class="filter-btn flex-shrink-0 px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-0.5 text-slate-500 hover:text-slate-800">基本計画</button>
                <button data-cat="政策・制度"
                    class="filter-btn flex-shrink-0 px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-0.5 text-slate-500 hover:text-slate-800">政策・制度</button>
                <button data-cat="組織・ネットワーク"
                    class="filter-btn flex-shrink-0 px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-0.5 text-slate-500 hover:text-slate-800">組織・ネットワーク</button>
                <button data-cat="システム基盤"
                    class="filter-btn flex-shrink-0 px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-0.5 text-slate-500 hover:text-slate-800">システム基盤</button>
                <button data-cat="その他"
                    class="filter-btn flex-shrink-0 px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 hover:bg-white hover:shadow-md hover:-translate-y-0.5 text-slate-500 hover:text-slate-800">その他</button>
            </div>
            <div class="relative w-full md:w-72">
                <input type="text" id="keyword-search" placeholder="キーワードで探す..."
                    class="w-full bg-slate-100/50 border border-slate-200/50 rounded-2xl px-5 py-2.5 text-sm focus:outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary/50 focus:bg-white transition-all placeholder-slate-400">
                <svg class="absolute right-4 top-3 w-4 h-4 text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-20 relative min-h-screen">

        <!-- Center Timeline Line -->
        <div
            class="absolute left-8 md:left-1/2 top-0 bottom-10 w-px md:w-0.5 timeline-line-gradient -translate-x-1/2 z-0">
        </div>

        <!-- Year Indicator (Floating side) -->
        <div class="fixed left-4 md:left-auto md:right-10 top-1/2 -translate-y-1/2 z-0 pointer-events-none select-none">
            <span id="floating-year"
                class="text-8xl md:text-[15rem] font-serif font-black text-slate-200/40 tabular-nums leading-none transition-all duration-700">2025</span>
        </div>

        <!-- Events Container -->
        <div id="events-wrapper" class="relative z-10 space-y-24 md:space-y-32">
            <!-- Loading Skeleton -->
            <div id="loading-skeleton" class="space-y-24 md:space-y-32">
                <div class="flex md:justify-start w-full md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
                <div class="flex md:justify-end w-full md:ml-auto md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-[60vh] flex flex-col justify-center items-center bg-stone-100 text-center px-4">
        <p class="text-2xl font-serif text-slate-400">そして、時は続く...</p>
        <div class="mt-8 text-xs text-slate-300 uppercase tracking-widest">© Research Support History Archive</div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const eventsWrapper = document.getElementById('events-wrapper');
        const floatingYear = document.getElementById('floating-year');
        const keywordSearch = document.getElementById('keyword-search');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let allEventsData = [];
        let currentFilter = 'All';

        // Event Element Creator (Zigzag)
        function createEventElement(eventData, index) {
            const isEven = index % 2 === 1;
            const isHigh = eventData.importance === 'high';
            const item = document.createElement('div');
            item.className = `event-item flex flex-col md:flex-row w-full relative z-10 transition-all duration-700 transform translate-y-20 opacity-0`;
            item.setAttribute('data-year', eventData.year);
            item.setAttribute('data-index', index);

            // Category Styles
            const catStyles = {
                '基本計画': 'bg-purple-50 text-purple-700 border-purple-100',
                '政策・制度': 'bg-blue-50 text-blue-700 border-blue-100',
                '組織・ネットワーク': 'bg-emerald-50 text-emerald-700 border-emerald-100',
                'システム基盤': 'bg-amber-50 text-amber-700 border-amber-100',
                'その他': 'bg-slate-50 text-slate-700 border-slate-100'
            };
            const currentStyle = catStyles[eventData.category] || 'bg-slate-50 text-slate-700 border-slate-100';

            // Icons
            const icons = {
                'policy': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`,
                'institution': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>`,
                'network': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`,
                'foundation': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M12 16V15m-1.292-1.292a1.292 1.292 0 101.825 1.825 1.292 1.292 0 00-1.825-1.825z"></path></svg>`,
                'digital': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`,
                'other': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z"></path></svg>`
            };
            const currentIcon = icons[eventData.iconType] || icons['other'];

            const cardClass = isHigh 
                ? 'bg-slate-900 text-white p-8 md:p-12 border-none shadow-2xl scale-105 high-importance-glow' 
                : 'bg-white p-6 md:p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1';

            const titleClass = isHigh 
                ? 'text-2xl md:text-3xl font-black text-white hover:text-primary' 
                : 'text-xl font-bold text-slate-800 hover:text-primary';

            const descriptionClass = isHigh
                ? 'text-slate-300 font-normal opacity-90'
                : 'text-slate-500 font-medium';

            const dotClass = isHigh
                ? 'bg-primary scale-150 ring-4 ring-primary/20'
                : 'bg-white border-2 border-primary';

            item.innerHTML = `
                <!-- Timeline Dot -->
                <div class="absolute left-8 md:left-1/2 w-4 h-4 rounded-full ${dotClass} -translate-x-1/2 top-10 md:top-8 z-20 shadow-sm transition-transform duration-300 hover:scale-125"></div>
                
                <div class="w-full md:w-1/2 pl-16 pr-4 md:px-12 ${isEven ? 'md:order-last md:ml-auto' : 'md:mr-auto'}">
                    <div class="group relative rounded-3xl overflow-hidden event-card ${cardClass} transition-all duration-300">
                        ${!isHigh ? `<div class="absolute top-0 left-0 w-1.5 h-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>` : ''}
                        
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isHigh ? 'bg-white/10 text-white' : 'bg-slate-50 text-slate-400 group-hover:bg-primary/10 group-hover:text-primary'} transition-colors">
                                    ${currentIcon}
                                </div>
                                <span class="text-3xl md:text-4xl font-serif font-black ${isHigh ? 'text-white' : 'text-slate-900'} leading-none">${eventData.year}</span>
                            </div>
                            <span class="inline-block px-3 py-1 rounded-xl text-[10px] font-bold uppercase tracking-widest ${currentStyle} border self-start sm:self-center">
                                ${eventData.tag}
                            </span>
                        </div>
                        
                        <h3 class="${titleClass} mb-4 leading-tight transition-colors">
                            ${eventData.url ? `<a href="${eventData.url}" target="_blank" class="hover:underline decoration-thickness-2">${eventData.title}</a>` : eventData.title}
                        </h3>
                        
                        <p class="text-base md:text-lg prose-custom ${descriptionClass}">
                            ${eventData.description}
                        </p>
                        
                        ${isHigh ? `
                        <div class="mt-8 pt-8 border-t border-white/10 flex items-center gap-2 text-primary text-xs font-bold uppercase tracking-widest">
                            <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                            Major Milestone
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            return item;
        }

        // Initialize GSAP
        function initGSAP() {
            ScrollTrigger.getAll().forEach(t => t.kill());

            const items = document.querySelectorAll('.event-item');

            items.forEach((item, i) => {
                const year = item.getAttribute('data-year');

                gsap.to(item, {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    ease: "power2.out",
                    scrollTrigger: {
                        trigger: item,
                        start: "top 85%",
                        toggleActions: "play none none none",
                        onEnter: () => floatingYear.innerText = year,
                        onEnterBack: () => floatingYear.innerText = year,
                    }
                });
            });

            // Hero animations
            gsap.fromTo("#hero-title", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 1, delay: 0.2 });
            gsap.fromTo("#hero-subtitle", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 1, delay: 0.5 });
            gsap.fromTo("#scroll-indicator", { opacity: 0 }, { opacity: 1, duration: 1, delay: 1 });
        }

        // Search & Filter Logic
        function renderTimeline() {
            const keyword = keywordSearch.value.toLowerCase();
            const filtered = allEventsData.filter(e => {
                const matchesCat = currentFilter === 'All' || e.category === currentFilter;
                const matchesKeyword = e.title.toLowerCase().includes(keyword) ||
                    e.description.toLowerCase().includes(keyword) ||
                    e.tag.toLowerCase().includes(keyword);
                return matchesCat && matchesKeyword;
            });

            eventsWrapper.innerHTML = '';
            if (filtered.length === 0) {
                eventsWrapper.innerHTML = '<div class="text-center py-20 text-slate-400">検索結果が見つかりませんでした。</div>';
            } else {
                filtered.forEach((e, idx) => {
                    eventsWrapper.appendChild(createEventElement(e, idx));
                });
            }
            setTimeout(initGSAP, 100);
        }

        // Filtering
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-slate-900', 'text-white', 'shadow-lg', 'shadow-slate-200', 'scale-105', 'font-semibold');
                    b.classList.add('hover:bg-white', 'hover:shadow-md', 'hover:-translate-y-0.5', 'text-slate-500', 'font-medium');
                });

                btn.classList.add('bg-slate-900', 'text-white', 'shadow-lg', 'shadow-slate-200', 'scale-105', 'font-semibold');
                btn.classList.remove('hover:bg-white', 'hover:shadow-md', 'hover:-translate-y-0.5', 'text-slate-500', 'font-medium');

                currentFilter = btn.getAttribute('data-cat');
                renderTimeline();
                
                // Scroll to active button if on mobile
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        });

        keywordSearch.addEventListener('input', renderTimeline);

        // Data Loading
        async function loadData() {
            try {
                const resp = await fetch('data/history.json');
                const data = await resp.json();

                allEventsData = data.sort((a, b) => b.year - a.year);

                document.getElementById('loading-skeleton')?.remove();
                renderTimeline();
            } catch (err) {
                console.error(err);
                eventsWrapper.innerHTML = '<div class="text-red-500 text-center py-20">データの読み込みに失敗しました。</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => { loadData(); });

    </script>
</body>

</html>
