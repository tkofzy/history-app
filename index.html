<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Support History Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@600;900&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                        serif: ['Noto Serif JP', 'serif'],
                    },
                    colors: {
                        primary: '#009eb3',
                        accent: '#ff007f',
                    }
                }
            }
        }
    </script>
    <style>
        .timeline-line-gradient {
            background: linear-gradient(to bottom, #cbd5e1 0%, #009eb3 20%, #ff007f 80%, transparent 100%);
        }
    </style>
</head>

<body class="overflow-x-hidden bg-stone-50 text-slate-800 font-sans selection:bg-primary selection:text-white">

    <!-- Hero Header -->
    <header
        class="relative h-[60vh] flex flex-col justify-center items-center text-center px-4 bg-gradient-to-br from-slate-100 to-stone-200">
        <h1 class="text-5xl md:text-7xl font-serif font-black tracking-tighter mb-4 opacity-0" id="hero-title">
            Historical Nav
        </h1>
        <p class="text-lg md:text-xl text-slate-600 font-light tracking-widest opacity-0" id="hero-subtitle">
            日本における研究支援の変遷を辿る
        </p>
        <div class="absolute bottom-10 animate-bounce cursor-pointer flex flex-col items-center gap-2 opacity-0"
            id="scroll-indicator">
            <span class="text-[10px] uppercase tracking-[0.3em] text-slate-400">Scroll Down</span>
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7-7-7"></path>
            </svg>
        </div>
    </header>

    <!-- Sticky Navigation (Glassmorphism) -->
    <nav
        class="sticky top-0 z-50 w-full bg-white/70 backdrop-blur-md border-b border-slate-200/50 transition-all duration-300">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center gap-4">
            <div class="flex flex-wrap justify-center gap-2">
                <button data-cat="All"
                    class="filter-btn active px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 bg-slate-800 text-white shadow-sm">全て</button>
                <button data-cat="基本計画"
                    class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 hover:bg-slate-100 text-slate-600">基本計画</button>
                <button data-cat="政策・制度"
                    class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 hover:bg-slate-100 text-slate-600">政策・制度</button>
                <button data-cat="組織・ネットワーク"
                    class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 hover:bg-slate-100 text-slate-600">組織・ネットワーク</button>
                <button data-cat="システム基盤"
                    class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 hover:bg-slate-100 text-slate-600">システム基盤</button>
                <button data-cat="その他"
                    class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 hover:bg-slate-100 text-slate-600">その他</button>
            </div>
            <div class="relative w-full md:w-64">
                <input type="text" id="keyword-search" placeholder="検索..."
                    class="w-full bg-white/50 border border-slate-200 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
                <svg class="absolute right-3 top-2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-20 relative min-h-screen">

        <!-- Center Timeline Line -->
        <div
            class="absolute left-8 md:left-1/2 top-0 bottom-10 w-px md:w-0.5 timeline-line-gradient -translate-x-1/2 z-0">
        </div>

        <!-- Year Indicator (Floating side) -->
        <div class="fixed left-4 md:left-auto md:right-10 top-1/2 -translate-y-1/2 z-0 pointer-events-none select-none">
            <span id="floating-year"
                class="text-8xl md:text-[15rem] font-serif font-black text-slate-200/40 tabular-nums leading-none transition-all duration-700">2025</span>
        </div>

        <!-- Events Container -->
        <div id="events-wrapper" class="relative z-10 space-y-24 md:space-y-32">
            <!-- Loading Skeleton -->
            <div id="loading-skeleton" class="space-y-24 md:space-y-32">
                <div class="flex md:justify-start w-full md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
                <div class="flex md:justify-end w-full md:ml-auto md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-[60vh] flex flex-col justify-center items-center bg-stone-100 text-center px-4">
        <p class="text-2xl font-serif text-slate-400">そして、時は続く...</p>
        <div class="mt-8 text-xs text-slate-300 uppercase tracking-widest">© Research Support History Archive</div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const eventsWrapper = document.getElementById('events-wrapper');
        const floatingYear = document.getElementById('floating-year');
        const keywordSearch = document.getElementById('keyword-search');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let allEventsData = [];
        let currentFilter = 'All';

        // Event Element Creator (Zigzag)
        function createEventElement(eventData, index) {
            const isEven = index % 2 === 1;
            const item = document.createElement('div');
            item.className = `event-item flex flex-col md:flex-row w-full relative z-10 transition-all duration-500 transform translate-y-10 opacity-0`;
            item.setAttribute('data-year', eventData.year);
            item.setAttribute('data-index', index);

            // Category Styles
            const catStyles = {
                '基本計画': 'bg-purple-50 text-purple-700 border-purple-100',
                '政策・制度': 'bg-blue-50 text-blue-700 border-blue-100',
                '組織・ネットワーク': 'bg-emerald-50 text-emerald-700 border-emerald-100',
                'システム基盤': 'bg-amber-50 text-amber-700 border-amber-100',
                'その他': 'bg-slate-50 text-slate-700 border-slate-100'
            };
            const currentStyle = catStyles[eventData.category] || 'bg-slate-50 text-slate-700 border-slate-100';

            item.innerHTML = `
                <!-- Timeline Dot (Mobile only at left, Desktop at center) -->
                <div class="absolute left-8 md:left-1/2 w-4 h-4 rounded-full bg-white border-2 border-primary -translate-x-1/2 top-10 md:top-8 z-20 shadow-sm transition-transform duration-300 hover:scale-125"></div>
                
                <div class="w-full md:w-1/2 pl-16 pr-4 md:px-12 ${isEven ? 'md:order-last md:ml-auto' : 'md:mr-auto'}">
                    <div class="group relative bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        
                        <div class="flex items-center gap-3 mb-3">
                            <span class="text-3xl font-serif font-black text-slate-900 leading-none">${eventData.year}</span>
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${currentStyle} border">
                                ${eventData.tag}
                            </span>
                        </div>
                        
                        <h3 class="text-xl font-bold mb-4 text-slate-800 leading-snug group-hover:text-primary transition-colors">
                            ${eventData.url ? `<a href="${eventData.url}" target="_blank" class="hover:underline decoration-thickness-2">${eventData.title}</a>` : eventData.title}
                        </h3>
                        
                        <p class="text-sm leading-relaxed text-slate-500 font-medium">
                            ${eventData.description}
                        </p>
                    </div>
                </div>
            `;
            return item;
        }

        // Initialize GSAP
        function initGSAP() {
            ScrollTrigger.getAll().forEach(t => t.kill());

            const items = document.querySelectorAll('.event-item');

            items.forEach((item, i) => {
                const year = item.getAttribute('data-year');

                gsap.to(item, {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    ease: "power2.out",
                    scrollTrigger: {
                        trigger: item,
                        start: "top 85%",
                        toggleActions: "play none none none",
                        onEnter: () => floatingYear.innerText = year,
                        onEnterBack: () => floatingYear.innerText = year,
                    }
                });
            });

            // Hero animations
            gsap.fromTo("#hero-title", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 1, delay: 0.2 });
            gsap.fromTo("#hero-subtitle", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 1, delay: 0.5 });
            gsap.fromTo("#scroll-indicator", { opacity: 0 }, { opacity: 1, duration: 1, delay: 1 });
        }

        // Search & Filter Logic
        function renderTimeline() {
            const keyword = keywordSearch.value.toLowerCase();
            const filtered = allEventsData.filter(e => {
                const matchesCat = currentFilter === 'All' || e.category === currentFilter;
                const matchesKeyword = e.title.toLowerCase().includes(keyword) ||
                    e.description.toLowerCase().includes(keyword) ||
                    e.tag.toLowerCase().includes(keyword);
                return matchesCat && matchesKeyword;
            });

            eventsWrapper.innerHTML = '';
            if (filtered.length === 0) {
                eventsWrapper.innerHTML = '<div class="text-center py-20 text-slate-400">検索結果が見つかりませんでした。</div>';
            } else {
                filtered.forEach((e, idx) => {
                    eventsWrapper.appendChild(createEventElement(e, idx));
                });
            }
            setTimeout(initGSAP, 100);
        }

        // Filtering
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('bg-slate-800', 'text-white', 'shadow-sm'));
                filterBtns.forEach(b => b.classList.add('hover:bg-slate-100', 'text-slate-600'));

                btn.classList.add('bg-slate-800', 'text-white', 'shadow-sm');
                btn.classList.remove('hover:bg-slate-100', 'text-slate-600');

                currentFilter = btn.getAttribute('data-cat');
                renderTimeline();
            });
        });

        keywordSearch.addEventListener('input', renderTimeline);

        // Data Loading
        async function loadData() {
            try {
                const resp = await fetch('data/history.json');
                const data = await resp.json();

                allEventsData = data.sort((a, b) => b.year - a.year);

                document.getElementById('loading-skeleton')?.remove();
                renderTimeline();
            } catch (err) {
                console.error(err);
                eventsWrapper.innerHTML = '<div class="text-red-500 text-center py-20">データの読み込みに失敗しました。</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => { loadData(); });

    </script>
</body>

</html>
