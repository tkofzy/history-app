<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResSupport Archive | History Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@600;900&family=Outfit:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'Noto Sans JP', 'sans-serif'],
                        serif: ['Noto Serif JP', 'serif'],
                    },
                    colors: {
                        primary: '#00f5ff', // Electric Cyan
                        vivid: '#ff00ff',   // Vivid Magenta
                        academic: '#0f172a', // Slate 900
                    }
                }
            }
        }
    </script>
    <style>
        .timeline-line-gradient {
            background: linear-gradient(to bottom, #cbd5e1 0%, #00f5ff 20%, #ff00ff 80%, #cbd5e1 100%);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .event-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .prose-custom {
            line-height: 1.85;
            letter-spacing: 0.02em;
        }

        /* Saturation Decay Classes */
        .era-saturation {
            filter: saturate(var(--era-sat, 1)) grayscale(var(--era-gray, 0));
            transition: filter 0.3s ease;
        }

        /* Innovation Era Glow */
        .modern-glow {
            box-shadow: 0 0 40px -10px rgba(0, 245, 255, 0.3);
            border-color: rgba(0, 245, 255, 0.4);
        }

        /* Filter Underline Interaction */
        .filter-btn {
            position: relative;
        }
        .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: #00f5ff;
            box-shadow: 0 0 10px #00f5ff;
            border-radius: 2px;
        }
    </style>
</head>

<body class="overflow-x-hidden bg-[#f8fafc] text-slate-900 font-sans selection:bg-primary selection:text-slate-900">



    <!-- Hero Header -->
    <header
        class="relative h-[80vh] flex flex-col justify-center items-center text-center px-4 bg-[#f8fafc]">
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 40px 40px;"></div>
        <h1 class="text-6xl md:text-8xl font-serif font-black tracking-tighter mb-8 opacity-0" id="hero-title">
            The Gradient <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-vivid">of Time</span>
        </h1>
        <p class="text-sm md:text-base text-slate-500 font-medium tracking-[0.5em] uppercase opacity-0" id="hero-subtitle">
            日本の研究支援 変遷録
        </p>
        <div class="absolute bottom-20 animate-bounce cursor-pointer flex flex-col items-center gap-4 opacity-0"
            id="scroll-indicator">
            <span class="text-[9px] uppercase tracking-[0.5em] text-slate-400">Descend into History</span>
            <svg class="w-8 h-8 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 14l-7 7-7-7"></path>
            </svg>
        </div>
    </header>

    <!-- Sticky Navigation (Archive Filters) -->
    <nav
        class="sticky top-0 z-50 w-full bg-[#f8fafc]/80 backdrop-blur-2xl border-b border-slate-200/40 py-4">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center gap-8">
            <div class="w-full flex items-center gap-4 overflow-x-auto hide-scrollbar md:flex-1">
                <button data-cat="All"
                    class="filter-btn active flex-shrink-0 px-2 py-1 text-sm font-bold transition-all duration-300 text-slate-900">全て</button>
                <button data-cat="基本計画"
                    class="filter-btn flex-shrink-0 px-2 py-1 text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-slate-900">基本計画</button>
                <button data-cat="政策・制度"
                    class="filter-btn flex-shrink-0 px-2 py-1 text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-slate-900">政策・制度</button>
                <button data-cat="組織・ネットワーク"
                    class="filter-btn flex-shrink-0 px-2 py-1 text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-slate-900">組織・ネットワーク</button>
                <button data-cat="システム基盤"
                    class="filter-btn flex-shrink-0 px-2 py-1 text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-slate-900">システム基盤</button>
                <button data-cat="その他"
                    class="filter-btn flex-shrink-0 px-2 py-1 text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-slate-900">その他</button>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="keyword-search" placeholder="ここから検索"
                    class="w-full bg-slate-200/50 border-none rounded-2xl px-6 py-3 text-xs focus:outline-none focus:ring-2 focus:ring-primary/30 focus:bg-white transition-all placeholder-slate-400 font-medium">
                <svg class="absolute right-5 top-3.5 w-4 h-4 text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-20 relative min-h-screen">

        <!-- Center Timeline Line -->
        <div
            class="absolute left-8 md:left-1/2 top-0 bottom-10 w-px md:w-0.5 timeline-line-gradient -translate-x-1/2 z-0">
        </div>
        
        <!-- Year Indicator (Floating side) -->
        <div class="fixed left-4 md:left-auto md:right-10 top-1/2 -translate-y-1/2 z-0 pointer-events-none select-none">
            <span id="floating-year"
                class="text-8xl md:text-[15rem] font-serif font-black text-slate-200/40 tabular-nums leading-none">2025</span>
        </div>



        <!-- Events Container -->
        <div id="events-wrapper" class="relative z-10 space-y-24 md:space-y-32">
            <!-- Loading Skeleton -->
            <div id="loading-skeleton" class="space-y-24 md:space-y-32">
                <div class="flex md:justify-start w-full md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
                <div class="flex md:justify-end w-full md:ml-auto md:w-1/2 px-4 md:px-12">
                    <div class="h-48 w-full bg-slate-200 animate-pulse rounded-2xl"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-[80vh] flex flex-col justify-center items-center bg-white text-center px-4 relative">
        <div class="max-w-xl">
            <p class="text-3xl md:text-5xl font-serif font-black text-slate-200 leading-tight mb-8">
                重奏する叡智の深淵へ。<br>
                <span class="text-lg font-sans tracking-[0.3em] font-light text-slate-400 uppercase">Into the Multilayered Abyss of Human Wisdom.</span>
            </p>
            <div class="flex items-center justify-center gap-4 text-[10px] text-slate-300 uppercase tracking-widest font-bold">
                <span>© 2026 Takeo FUJII</span>
            </div>
        </div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const eventsWrapper = document.getElementById('events-wrapper');
        const floatingYear = document.getElementById('floating-year');
        const keywordSearch = document.getElementById('keyword-search');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let allEventsData = [];
        let currentFilter = 'All';

        // Calculation for Saturation Decay
        function getSaturationStyles(year) {
            // 2025 -> 1.0 (Full Color)
            // 1995 -> 0.0 (Monochrome)
            const minYear = 1995;
            const maxYear = 2025;
            const factor = Math.max(0, Math.min(1, (year - minYear) / (maxYear - minYear)));
            
            return {
                sat: factor,
                gray: 1 - factor
            };
        }

        // Event Element Creator (Zigzag)
        function createEventElement(eventData, index) {
            const isEven = index % 2 === 1;
            const isHigh = eventData.importance === 'high';
            const isModern = eventData.era_phase === 'Innovation';
            const item = document.createElement('div');
            
            const styles = getSaturationStyles(eventData.year);
            item.style.setProperty('--era-sat', styles.sat);
            item.style.setProperty('--era-gray', styles.gray);

            item.className = `event-item era-saturation flex flex-col md:flex-row w-full relative z-10 transition-all duration-300 transform translate-y-2 opacity-0`;
            item.setAttribute('data-year', eventData.year);
            item.setAttribute('data-index', index);

            // Category Icons (Advanced)
            const icons = {
                'policy': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`,
                'institution': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>`,
                'network': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>`,
                'foundation': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M12 16V15m-1.292-1.292a1.292 1.292 0 101.825 1.825 1.292 1.292 0 00-1.825-1.825z"></path></svg>`,
                'digital': `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`
            };
            const currentIcon = icons[eventData.category_icon] || icons['policy'];

            const cardBaseClass = `group relative rounded-[2rem] overflow-hidden event-card bg-white transition-all duration-300`;
            const cardModernClass = isModern ? 'modern-glow border-primary/20 scale-[1.02]' : 'border-slate-100 shadow-sm';
            const cardHighClass = isHigh ? 'p-10 md:p-14 border-none shadow-2xl ring-1 ring-slate-100' : 'p-8 md:p-10 border';

            item.innerHTML = `
                <!-- Timeline Dot -->
                <div class="absolute left-8 md:left-1/2 w-3 h-3 rounded-full bg-slate-900 -translate-x-1/2 top-12 md:top-10 z-20 shadow-xl border-4 border-white"></div>
                
                <div class="w-full md:w-1/2 pl-16 pr-6 md:px-16 ${isEven ? 'md:order-last md:ml-auto' : 'md:mr-auto'}">
                    <div class="${cardBaseClass} ${cardModernClass} ${cardHighClass} hover:shadow-2xl hover:-translate-y-2">
                        
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 mb-10">
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 rounded-2xl flex items-center justify-center bg-slate-50 text-slate-300 group-hover:bg-primary/10 group-hover:text-primary transition-all duration-500 scale-110">
                                    ${currentIcon}
                                </div>
                                <span class="text-4xl md:text-5xl font-serif font-black text-slate-900 tracking-tighter leading-none">${eventData.year}</span>
                            </div>
                            <span class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-400 bg-slate-100 px-3 py-1 rounded-full whitespace-nowrap">
                                ${eventData.category}
                            </span>
                        </div>
                        
                        <h3 class="text-2xl md:text-3xl font-bold text-slate-900 mb-6 leading-[1.2] group-hover:text-primary transition-colors">
                            ${eventData.url ? `<a href="${eventData.url}" target="_blank" class="hover:underline underline-offset-8 decoration-1">${eventData.title}</a>` : eventData.title}
                        </h3>
                        
                        <p class="text-sm md:text-base prose-custom text-slate-500 font-medium pb-2 border-b border-slate-50/50">
                            ${eventData.description}
                        </p>
                        
                        <div class="mt-4 flex flex-wrap gap-2 group-hover:opacity-100 transition-opacity">
                            <span class="text-[10px] font-black tracking-widest text-primary uppercase">#${eventData.tag}</span>
                        </div>
                    </div>
                </div>
            `;
            return item;
        }

        // Initialize GSAP
        function initGSAP() {
            ScrollTrigger.getAll().forEach(t => t.kill());
            const items = document.querySelectorAll('.event-item');

            items.forEach((item, i) => {
                const year = item.getAttribute('data-year');
                gsap.to(item, {
                    opacity: 1,
                    y: 0,
                    duration: 0.3,
                    ease: "power1.out",
                    scrollTrigger: {
                        trigger: item,
                        start: "top 85%",
                        toggleActions: "play none none none",
                        onEnter: () => floatingYear.innerText = year,
                        onEnterBack: () => floatingYear.innerText = year,
                    }
                });
            });

            // Hero animations
            gsap.fromTo("#hero-title", { opacity: 0, y: 40, filter: 'blur(20px)' }, { opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.5, delay: 0.2, ease: "power4.out" });
            gsap.fromTo("#hero-subtitle", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 1.2, delay: 0.6 });
            gsap.fromTo("#scroll-indicator", { opacity: 0 }, { opacity: 1, duration: 2, delay: 1.2 });
        }

        // Search & Filter Logic
        function renderTimeline() {
            const keyword = keywordSearch.value.toLowerCase();
            const filtered = allEventsData.filter(e => {
                const matchesCat = currentFilter === 'All' || e.category === currentFilter;
                const matchesKeyword = e.title.toLowerCase().includes(keyword) ||
                    e.description.toLowerCase().includes(keyword) ||
                    e.tag.toLowerCase().includes(keyword);
                return matchesCat && matchesKeyword;
            });

            eventsWrapper.innerHTML = '';
            if (filtered.length === 0) {
                eventsWrapper.innerHTML = '<div class="text-center py-40 text-slate-300 font-serif italic text-xl">アーカイブに該当する記録は見つかりませんでした。</div>';
            } else {
                filtered.forEach((e, idx) => {
                    eventsWrapper.appendChild(createEventElement(e, idx));
                });
            }
            setTimeout(initGSAP, 100);
        }

        // Filtering
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => {
                    b.classList.remove('active', 'text-slate-900');
                    b.classList.add('text-slate-400');
                });

                btn.classList.add('active', 'text-slate-900');
                btn.classList.remove('text-slate-400');

                currentFilter = btn.getAttribute('data-cat');
                renderTimeline();
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        });

        keywordSearch.addEventListener('input', renderTimeline);

        // Data Loading
        async function loadData() {
            try {
                const resp = await fetch('data/history.json');
                const data = await resp.json();
                allEventsData = data.sort((a, b) => b.year - a.year);
                document.getElementById('loading-skeleton')?.remove();
                renderTimeline();
            } catch (err) {
                console.error(err);
                eventsWrapper.innerHTML = '<div class="text-red-400 text-center py-20 font-serif">資料の読み込み中にエラーが発生しました。</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => { loadData(); });

    </script>
</body>

</html>
